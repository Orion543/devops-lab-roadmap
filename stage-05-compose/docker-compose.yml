services:
  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  app:
    image: python:3-alpine
    working_dir: /srv/app
    command: python3 -m http.server 5000
    volumes:
      - ./app:/srv/app
    restart: unless-stopped
    networks:
      - app-network
    environment:
      - APP_ENV=development
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  app-network:
    driver: bridge
