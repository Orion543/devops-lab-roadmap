server {
    listen 80;
    server_name _;

    location / {
        try_files $uri $uri/ =404;
    }

    location /app/ {
        proxy_pass http://app:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
