name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build and start services with Compose
        run: |
          cd stage-05-compose
          docker compose up -d --build

      - name: Wait for services to be ready
        run: sleep 5

      - name: Test service
        run: curl http://localhost:8080/app/
